# This workflow runs for every pull request
name: PR CI

on:
  pull_request:

jobs:
  pr-ci-js-helpers-test:
    uses: ./.github/workflows/shared-ci.yml
  pr-ci-all-required:
    if: always()
    needs:
      - pr-ci-js-helpers-test
    runs-on: ubuntu-22.04
    steps:
      - name: Verify all required jobs passed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
